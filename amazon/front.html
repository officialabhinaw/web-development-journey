<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>front designing</title>
    <style>
        * {
            border: none;
            outline: none;
            list-style: none;

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            background-color: navy;
        }

        .hero {
            position: relative;
            width: 100%;
            overflow: hidden;
            height: 730px;
        }

        .hero img {
            display: block;
            width: 100%;
            height: ;
        }

        .dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translate(-50%);
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: blueviolet;
            cursor: pointer;
        }

        .dotactive {
            color: white;
        }

        .slides {
            width: 400%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease;
            ;
        }

        .slides img {
            width: 25%;
            height: 100%;
            object-fit: cover;
        }

        .Container {
            font-size: 25px;
            display: flex;
            gap: 20px;
            list-style: none;
            /*justify-content: space-between;*/
            padding: 20px 40px;
            align-self: start;
        }

        .final {
            background-color: navy;
            font-size: 25px;
        }
    </style>
</head>

<body>
    <div>
        <ul class="Container">
            <li>Prime video</li>
            <li><button class="final" onclick="window.location.href='create.html'">Home</button></li>
            <li><button class="final" onclick="window.location.href='create.html'">Free to me</button></li>
            <li><button class="final" onclick="window.location.href='create.html'">Movie</button></li>
            <li><button class="final" onclick="window.location.href='create.html'">Tv shows</button></li>
            <li><button class="final" onclick="window.location.href='create.html'">Live TV</button></li>
            <li><button class="final" onclick="window.location.href='create.html'">Subcription</button></li>


            <li style="margin-left: auto;"><button class="final"
                    onclick="window.location.href='create.html'">Setting</button></li>
            <li><button class="final" onclick="window.location.href='profile.html'">Profile</button>
            </li>
            <li><button class="final" onclick="window.location.href='sign.html'">Join Prime</button></li>
        </ul>
    </div>
    <div class="hero">
        <div class="slides" id="slides">
            <img src="sex lfe.webp" alt="">
            <img src="First-Love.jpeg" alt="">
            <img src="middle class.webp" alt="">
            <img src="ARMY.webp" alt="">
        </div>
        <div class="dots">
            <span class="dot active" onclick="goTo(0)"></span>
            <span class="dot" onclick="goTo(1)"></span>
            <span class="dot " onclick="goTo(2)"></span>
            <span class="dot" onclick="goTo(3)"></span>
        </div>
    </div>
    <script>
        let current = 0;

        function goTo(index) {
            current = index;
            document.getElementById('slides').style.transform = `translateX(-${index * 25}%)`;

            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }
    </script>
</body>

</html>
