<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: bounce 1.2s cubic-bezier(0.24, 0.84, 0.42, 1) infinite;
        }

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }

        
        @keyframes bounce {
    0%   { bottom: 0px;                    left: 0%;  }
    6%   { bottom: calc(30vh);             left: 5%;  }
    12%  { bottom: calc(55vh);             left: 10%; }
    18%  { bottom: calc(75vh);             left: 15%; }
    25%  { bottom: calc(80vh - 121px);     left: 20%; }
    32%  { bottom: calc(75vh);             left: 25%; }
    38%  { bottom: calc(55vh);             left: 30%; }
    44%  { bottom: calc(30vh);             left: 35%; }
    50%  { bottom: 0px;                    left: 40%; }
    56%  { bottom: calc(30vh);             left: 45%; }
    62%  { bottom: calc(55vh);             left: 50%; }
    68%  { bottom: calc(75vh);             left: 55%; }
    75%  { bottom: calc(80vh - 121px);     left: 60%; }
    82%  { bottom: calc(75vh);             left: 65%; }
    88%  { bottom: calc(55vh);             left: 70%; }
    94%  { bottom: calc(30vh);             left: 75%; }
    100% { bottom: 0px;                    left: 80%; }
}
    </style>
</head>

<body>
    <div class="container">

        <div class="box">
        </div>
    </div>
    <!-- 
   
     -->
</body>

</html>
