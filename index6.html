<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Forms-lets learn it</title>
</head>

<body>
    <form action="post">
        <h1>Form to apply for powered ai</h1>
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your user name" autofocus>

            <div>
                <div>
                    <input type="radio" id="male" gender="male" value="male">
                    <label for="male">male</label>
                    <input type="radio" id="female" gender="female" value="female">
                    <label for="female">female</label>
                </div>
                <div>
                    <input type="checkbox" id="subscriber" name="subscriber" value="yes">
                    <label for="subscriber">subscriber to news letter</label>
                </div>
                <div>
                    <label for="comment">Enter your comment</label>
                    <br>
                    <textarea name="comment" rows="4" cols="50" id="comment"></textarea>
                </div>
                <div>

                    <select name="fruits">
                        <option value="Apple">Apple</option>
                        <option value="Banana">Banana</option>
                        <option value="choclate">choclate</option>
                    </select>
                </div>
    </form>
</body>

</html>
