<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS box modal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            border: 20px;
            height: 200px;
            box-sizing: border-box;
        }

        .box {
            background-color: aqua;
        }

        .box1 {
            color: red;
            padding: 10px;
        }

        .box2 {
            color: blue;
        }
    </style>
</head>

<body>
    <div class="box box1">I am box</div>
    <div class="box box2">I am box</div>
</body>

</html>
